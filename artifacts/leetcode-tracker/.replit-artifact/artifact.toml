kind = "web"
previewPath = "/"
title = "LeetCode Mastery Tracker"
version = "1.0.0"
id = "artifacts/leetcode-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19733

[services.development]
run = "pnpm --filter @workspace/leetcode-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/leetcode-tracker", "run", "build" ]
publicDir = "artifacts/leetcode-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19733"
BASE_PATH = "/"
